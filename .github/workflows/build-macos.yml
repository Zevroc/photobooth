name: Build macOS

on:
  workflow_dispatch:  # trigger manuel depuis l'interface GitHub
  push:
    tags:
      - 'v*'  # trigger automatique sur les tags de version

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build .app bundle
        run: python build.py

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r Photobooth-macOS.zip Photobooth.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photobooth-macOS
          path: dist/Photobooth-macOS.zip
          retention-days: 30
